<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
    <header>
        <h1>Little Taco Shop Hours</h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html">About LTS</a></li>
            <li><a href="index.html">Our Menu</a></li>
            <li><a href="storehours.html">Store Hours</a></li>
        </ul>
        <figure>
            <img src="./Images/contactus_image.png" alt="Store hours image" height = "350px">
            <figcaption>Little Taco Shop Tacos</figcaption>
        </figure>
        
    </header>

    <main>
        <hr>
        <fieldset>
            <legend>Send Us a Message</legend>
            <form action="https:/httpbin.org/get" method="get">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required placeholder="Enter your name">
                <br><br>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email">
                <br><br>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="4" cols="50" required placeholder="Type your message here..."></textarea>
                <br><br>

                <button type="submit" value="Submit">
                    Submit
                </button>

                <button type="reset" value="Reset">
                    Reset
                </button>
            </form>
        </fieldset>
        </form>    

        <section>
            
            <h2>Our Location</h2>
            <address>
                123 Taco Street<br>
                Taco City, TC 12345<br>
                United States
            </address>
            <p>Phone: (123) 456-7890</p>
            <p>Email: <a href="mailto:contact@littletacoshop.com">contact@littletacoshop.com</a></p>

            <a href="#top">Back to Top</a>
        </section>
    </main>
    <footer>
            <hr>
        <p> Copyright &copy The Little Taco Shop. </p>
    </footer>
    </div>
</body>
</html>
